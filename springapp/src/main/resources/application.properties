# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/spotify_playlist_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Ratheesh@1703
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Server Configuration
server.port=8080
spring.devtools.livereload.enabled=false
spring.devtools.restart.enabled=false

# JWT Configuration
jwt.secret=SpotifyPlaylistManagementSystemSecretKey2024MusicPlatformJWTTokenSecurityKey
jwt.expiration.free=14400000
jwt.expiration.premium=86400000
jwt.expiration.artist=43200000
jwt.refresh.expiration=2592000000

# Music Platform Configuration
music.platform.free.skip.limit=6
music.platform.free.audio.quality=128kbps
music.platform.premium.audio.quality=320kbps
music.platform.max.playlist.size=10000
music.platform.free.max.followers=5000
music.platform.collaboration.free.limit=10
music.platform.collaboration.premium.limit=100

# Rate Limiting Configuration
rate.limit.login.attempts=5
rate.limit.login.window=900000
rate.limit.api.free=1000
rate.limit.api.premium=5000
rate.limit.upload.artist=10
rate.limit.playlist.creation.free=20
rate.limit.social.interactions=100

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Spotify API Configuration (placeholder)
spotify.client.id=${SPOTIFY_CLIENT_ID:your_spotify_client_id}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET:your_spotify_client_secret}
spotify.redirect.uri=${SPOTIFY_REDIRECT_URI:http://localhost:8080/api/auth/spotify/callback}

# Social Media Integration
social.facebook.app.id=${FACEBOOK_APP_ID:your_facebook_app_id}
social.twitter.api.key=${TWITTER_API_KEY:your_twitter_api_key}
social.instagram.client.id=${INSTAGRAM_CLIENT_ID:your_instagram_client_id}

# Content Delivery Network
cdn.base.url=${CDN_BASE_URL:https://cdn.spotify-clone.com}
cdn.audio.path=/audio
cdn.images.path=/images

# Analytics Configuration
analytics.batch.size=1000
analytics.flush.interval=300000
analytics.retention.days=365

# Security Configuration
security.cors.allowed.origins=http://localhost:3000,http://localhost:8081,http://localhost:8082
security.cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
security.cors.allowed.headers=*
security.cors.allow.credentials=true

# Logging Configuration
logging.level.com.examly.springapp=INFO
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
